<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Detail</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <style>
    body { background: #f8f4ee; font-family: 'Segoe UI', Arial, sans-serif; }

    .bs-navbar { background: #2d2d2d !important; padding: 0; }
    .bs-navbar .navbar-brand { color: #c8a96e !important; font-size: 1.2rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    .bs-navbar .nav-link { color: #ccc !important; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 1rem 1.1rem !important; }
    .bs-navbar .nav-link:hover, .bs-navbar .nav-link.active { color: #c8a96e !important; }

    /* Hotel hero */
    .hotel-hero { background: linear-gradient(135deg, #2d2d2d 60%, #c8a96e 100%); color: #fff; padding: 48px 0 36px; }
    .hotel-hero h1 { font-size: 2rem; font-weight: 300; letter-spacing: 2px; margin-bottom: 6px; }
    .hotel-hero .meta { color: rgba(255,255,255,0.65); font-size: 13px; letter-spacing: 1px; }
    .stars-gold { color: #c8a96e; font-size: 16px; }

    /* Info cards */
    .info-section { background: #fff; border: none; border-radius: 0; box-shadow: 0 4px 24px rgba(0,0,0,0.07); margin-top: -20px; position: relative; z-index: 10; padding: 28px 32px; }

    /* Amenity pill */
    .amenity-pill { display: inline-block; background: #f8f4ee; color: #2d2d2d; border: 1px solid #e8dfd0; border-radius: 20px; padding: 4px 14px; font-size: 12px; font-weight: 600; margin: 3px; }

    /* Section heading */
    .sec-heading { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #2d2d2d; padding-bottom: 10px; border-bottom: 2px solid #c8a96e; margin-bottom: 20px; display: inline-block; }

    /* Date filter bar */
    .date-filter-bar { background: #f8f4ee; border-bottom: 1px solid #f0ebe2; padding: 10px 24px; display: none; }
    .form-control-date { border-radius: 0; border: 1px solid #e0d8cc; font-size: 13px; padding: 8px 12px; }
    .form-control-date:focus { border-color: #c8a96e; box-shadow: 0 0 0 0.15rem rgba(200,169,110,0.15); outline: none; }
    .btn-filter-dates { background: #c8a96e; color: #fff; border-radius: 0; padding: 8px 20px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; border: 2px solid #c8a96e; transition: all 0.3s; white-space: nowrap; }
    .btn-filter-dates:hover { background: #2d2d2d; border-color: #2d2d2d; color: #fff; }

    /* Rooms table */
    .rooms-card { background: #fff; border: none; border-radius: 0; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-top: 24px; }
    .rooms-card .table thead th { background: #2d2d2d; color: #c8a96e; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; border: none; padding: 14px 16px; font-weight: 600; }
    .rooms-card .table tbody td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid #f0ebe2; vertical-align: middle; }

    .status-available { color: #198754; font-weight: 700; font-size: 12px; letter-spacing: 0.5px; }
    .status-booked    { color: #dc3545; font-weight: 700; font-size: 12px; letter-spacing: 0.5px; }

    .btn-book-room { background: #c8a96e; color: #fff; border-radius: 0; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; padding: 7px 18px; border: 2px solid #c8a96e; transition: all 0.3s; }
    .btn-book-room:hover { background: #2d2d2d; border-color: #2d2d2d; color: #fff; }
    .btn-book-room:disabled { opacity: 0.35; cursor: default; background: #ccc; border-color: #ccc; }

    #error { color: #dc3545; font-size: 13px; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bs-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-building me-2"></i>Hotel Engine</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-arrow-left me-1"></i>Back to Search</a></li>
          <li class="nav-item"><a class="nav-link" href="mybookings.html"><i class="bi bi-list-check me-1"></i>My Bookings</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html"><i class="bi bi-bar-chart me-1"></i>Revenue Report</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hotel Hero -->
  <div class="hotel-hero">
    <div class="container">
      <div id="heroBreadcrumb" class="mb-2">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-0" style="background:transparent; padding:0; font-size:12px;">
            <li class="breadcrumb-item"><a href="index.html" style="color:#c8a96e;">Search</a></li>
            <li class="breadcrumb-item active" style="color:rgba(255,255,255,0.5);" id="breadcrumbName">Hotel</li>
          </ol>
        </nav>
      </div>
      <h1 id="hotelName">Loading...</h1>
      <div class="meta" id="hotelMeta"></div>
    </div>
  </div>

  <!-- Info Section -->
  <div class="container">
    <div class="info-section" id="catalogSection">
      <div class="row g-4">
        <div class="col-lg-8">
          <div id="hotelDesc"></div>

          <div class="mt-4">
            <div class="sec-heading"><i class="bi bi-stars me-2"></i>Amenities</div>
            <div id="amenitiesList"></div>
          </div>
        </div>
        <div class="col-lg-4">
          <div style="background:#f8f4ee; padding:22px; border-left:3px solid #c8a96e; margin-bottom:16px;">
            <div class="sec-heading"><i class="bi bi-geo-alt me-2"></i>Address</div>
            <p id="hotelAddress" class="text-muted" style="font-size:14px; margin:0;"></p>
          </div>
          <!-- Age / guest policy — populated from MongoDB catalog -->
          <div id="agePolicyBox" style="display:none; background:#f8f4ee; padding:18px 22px; border-left:3px solid #c8a96e;">
            <div class="sec-heading"><i class="bi bi-people me-2"></i>Guest Policy</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Rooms Section -->
    <div class="rooms-card mt-4">
      <div class="d-flex align-items-center justify-content-between px-4 py-3" style="border-bottom:1px solid #f0ebe2; flex-wrap:wrap; gap:12px;">
        <span style="font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#2d2d2d;">
          <i class="bi bi-door-open me-2" style="color:#c8a96e;"></i>Rooms
        </span>
        <!-- Inline date filter -->
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <span style="font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#aaa;">Check availability for:</span>
          <input type="date" id="filterCheckIn"  class="form-control-date" style="width:150px;">
          <span style="color:#aaa; font-size:12px;">→</span>
          <input type="date" id="filterCheckOut" class="form-control-date" style="width:150px;">
          <button class="btn btn-filter-dates" onclick="applyDateFilter()">
            <i class="bi bi-search me-1"></i>Check
          </button>
        </div>
      </div>

      <!-- Active date filter notice -->
      <div class="date-filter-bar" id="dateFilterBar"></div>

      <div class="px-4 pt-2">
        <div id="error"></div>
      </div>
      <div class="table-responsive">
        <table class="table mb-0" id="roomsTable" style="display:none">
          <thead>
            <tr>
              <th>Room</th>
              <th>Type</th>
              <th>Rate (₫ / night)</th>
              <th>Capacity</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="roomsBody"></tbody>
        </table>
      </div>
      <div class="px-4 py-3" id="roomsStatus">
        <div class="d-flex align-items-center gap-2 text-muted" style="font-size:13px;">
          <div class="spinner-border spinner-border-sm" style="color:#c8a96e;" role="status"></div>
          Loading rooms...
        </div>
      </div>
    </div>

    <div class="pb-5"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/hotel.js"></script>
  <script>
    window.onload = () => {
      const params    = new URLSearchParams(window.location.search);
      const hotelId   = params.get('id');
      const hotelName = params.get('name');
      if (!hotelId) {
        document.body.innerHTML = '<div class="container mt-5"><div class="alert alert-warning rounded-0">No hotel selected. <a href="index.html">Go back</a></div></div>';
        return;
      }
      document.title = hotelName || 'Hotel Detail';
      document.getElementById('hotelName').textContent = hotelName || 'Hotel Detail';
      document.getElementById('breadcrumbName').textContent = hotelName || 'Hotel';

      //pre-fill date pickers from URL params if present
      const today    = new Date().toISOString().split('T')[0];
      const checkIn  = params.get('check_in')  || '';
      const checkOut = params.get('check_out') || '';
      document.getElementById('filterCheckIn').min  = today;
      document.getElementById('filterCheckOut').min = today;
      if (checkIn)  document.getElementById('filterCheckIn').value  = checkIn;
      if (checkOut) document.getElementById('filterCheckOut').value = checkOut;

      loadCatalog(hotelId);
      loadRooms(hotelId);
    };

    function applyDateFilter() {
      const params   = new URLSearchParams(window.location.search);
      const hotelId  = params.get('id');
      const name     = params.get('name') || '';
      const checkIn  = document.getElementById('filterCheckIn').value;
      const checkOut = document.getElementById('filterCheckOut').value;

      if (!checkIn || !checkOut) {
        alert('Please select both check-in and check-out dates.');
        return;
      }
      if (checkOut <= checkIn) {
        alert('Check-out must be after check-in.');
        return;
      }

      // Reload page with date params so loadRooms picks them up
      window.location.href =
        `hotel.html?id=${hotelId}&name=${encodeURIComponent(name)}` +
        `&check_in=${checkIn}&check_out=${checkOut}`;
    }
  </script>
</body>
</html>
